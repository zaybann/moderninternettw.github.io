<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Betting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg-dark: #001f3f; --bg-card: #003366; --accent-blue: #007bff; 
            --white: #ffffff; --navy-btn: #002d5a; --gold: #ffc107; --red: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: var(--white); padding-bottom: 100px; }
        .header { display: flex; align-items: center; padding: 15px; background: #001f3f; border-bottom: 1px solid rgba(0,123,255,0.2); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; width: 40px; }
        .header-title { flex-grow: 1; text-align: center; font-size: 18px; font-weight: bold; color: var(--accent-blue); }
        .bet-card { background: var(--bg-card); padding: 20px; margin: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 14px; margin-bottom: 12px; display: block; color: var(--accent-blue); font-weight: bold; }
        .digit-inputs { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .digit-inputs input { width: 55px; height: 55px; background: var(--bg-dark); border: 1px solid var(--accent-blue); border-radius: 8px; text-align: center; color: white; font-size: 22px; font-weight: bold; outline: none; }
        .amount-section { display: flex; gap: 10px; align-items: flex-end; }
        .amount-input { width: 100%; height: 48px; background: var(--bg-dark); border: 1px solid var(--accent-blue); border-radius: 8px; padding: 0 15px; color: white; font-size: 16px; outline: none; }
        .add-btn { background: var(--accent-blue); color: white; border: none; height: 48px; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .list-card { background: var(--bg-card); margin: 15px; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .bet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-r-btn { border: 1px solid var(--gold); background: transparent; color: var(--gold); padding: 4px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-right: 5px; }
        .item-del-btn { border: 1px solid var(--red); background: transparent; color: var(--red); padding: 4px 10px; border-radius: 6px; cursor: pointer; }
        #rModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); width: 92%; max-width: 400px; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--accent-blue); }
        .r-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; max-height: 350px; overflow-y: auto; padding: 5px; }
        .r-item { padding: 10px; background: #001f3f; border: 1px solid var(--accent-blue); border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .r-item.selected { background: var(--accent-blue); border-color: white; }
        .r-item.disabled-num { background: #1a0000; border-color: var(--red); color: #555; cursor: not-allowed; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: var(--accent-blue); color: white; }
        .btn-cancel { background: #444; color: white; }
        .footer-action { position: fixed; bottom: 0; width: 100%; background: #001f3f; padding: 15px; border-top: 1px solid rgba(0,123,255,0.2); }
        .place-bet-btn { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title">4D ထိုးရန်</div>
    </div>

    <div class="bet-card">
        <span class="label">ထိုးမည့်ဂဏန်းများကို ရိုက်ထည့်ပါ</span>
        <div class="digit-inputs">
            <input type="number" id="d1" oninput="window.moveFocus(this, 'd2')" maxlength="1">
            <input type="number" id="d2" oninput="window.moveFocus(this, 'd3')" maxlength="1">
            <input type="number" id="d3" oninput="window.moveFocus(this, 'd4')" maxlength="1">
            <input type="number" id="d4" maxlength="1">
        </div>
        <div class="amount-section">
            <input type="number" id="betAmt" class="amount-input" value="100">
            <button class="add-btn" id="addBtn" onclick="window.addBet()"><i class="fas fa-plus-circle"></i> ပေါင်းမည်</button>
        </div>
    </div>

    <div class="list-card">
        <div id="listHeader" style="font-size: 14px; color: var(--accent-blue); margin-bottom: 10px; font-weight: bold;">ရွေးချယ်ထားသော ဂဏန်းများ ( 0 )</div>
        <div id="betList"></div>
    </div>

    <div id="rModal">
        <div class="modal-content">
            <h3 style="color: var(--gold); margin-bottom: 15px;">R မည့်ဂဏန်းများကိုရွေးပါ</h3>
            <div class="r-grid" id="rGrid"></div>
            <div class="modal-btns">
                <button class="m-btn btn-cancel" onclick="window.closeRModal()">ပိတ်မည်</button>
                <button class="m-btn btn-confirm" onclick="window.confirmRSelection()">ပေါင်းထည့်မည်</button>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="place-bet-btn" id="mainBetBtn" onclick="window.submitBets()">ထိုးမည် <i class="fas fa-arrow-right"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUk-1FHFjhIVDD4foYuKHM7PyT_A1A1vk",
            authDomain: "twod-aa6c1.firebaseapp.com",
            projectId: "twod-aa6c1",
            storageBucket: "twod-aa6c1.appspot.com",
            messagingSenderId: "674076613631",
            appId: "1:674076613631:android:b21b4027ebe6f6f169e5ca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let closedList = [];
        window.addedBets = [];
        let selectedRNums = [];
        let currentRBaseAmt = 0;
        let isDataLoaded = false;

        // ၁။ Loading ပြသခြင်း
        Swal.fire({
            title: 'ခဏစောင့်ပါ...',
            allowOutsideClick: false,
            showConfirmButton: false,
            background: "#002d5a",
            color: "#fff",
            didOpen: () => { Swal.showLoading(); }
        });

        // ၂။ AdminSettings (ပိတ်ဂဏန်းနှင့် Section အဖွင့်အပိတ်)
        onSnapshot(doc(db, "settings", "time_control"), (snap) => {
            const betBtn = document.getElementById('mainBetBtn');
            if (snap.exists()) {
                const status = snap.data().section_4d;
                if (status === false) {
                    betBtn.innerText = "ခေတ္တပိတ်ထားပါသည်";
                    betBtn.style.background = "#555";
                    betBtn.disabled = true;
                    betBtn.onclick = null;
                } else {
                    betBtn.innerText = "ထိုးမည်";
                    betBtn.style.background = "var(--accent-blue)";
                    betBtn.disabled = false;
                    betBtn.onclick = () => window.submitBets();
                }
            }
        });

        onSnapshot(doc(db, "settings", "4d_settings"), (snap) => {
            if (snap.exists()) {
                const closedStr = snap.data().closed || "";
                closedList = closedStr.split(',').map(n => n.trim());
            }
            if (!isDataLoaded) {
                isDataLoaded = true;
                Swal.close();
            }
        });

        // ၃။ Functions များကို Global (window) အဖြစ်သတ်မှတ်ခြင်း
        window.moveFocus = (current, nextId) => { if (current.value.length >= 1) document.getElementById(nextId).focus(); }

        window.addBet = () => {
            if (!isDataLoaded) return;
            const num = document.getElementById('d1').value + document.getElementById('d2').value + 
                        document.getElementById('d3').value + document.getElementById('d4').value;
            const amt = document.getElementById('betAmt').value;

            if (num.length < 4 || amt == '') {
                Swal.fire({ title: "ဂဏန်းနှင့် ငွေဖြည့်ပါ", icon: "warning", background: "#003366", color: "#fff", timer: 1200, showConfirmButton: false });
                return;
            }
            if (closedList.includes(num)) {
                Swal.fire({ title: "ဂဏန်းပိတ်ထားပါသည်", text: `${num} သည် ခေတ္တပိတ်ထားသောဂဏန်းဖြစ်ပါသည်`, icon: "error", background: "#003366", color: "#fff" });
                return;
            }
            if(window.addedBets.some(b => b.num === num)) {
                Swal.fire({ title: "ဤဂဏန်းပေါင်းပြီးသားဖြစ်သည်", icon: "info", background: "#003366", color: "#fff", timer: 1200, showConfirmButton: false });
                return;
            }

            window.addedBets.push({ num: num, amt: amt });
            window.updateUI();
            ['d1','d2','d3','d4'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('d1').focus();
        };

        window.removeBet = (index) => {
            const realIndex = window.addedBets.length - 1 - index;
            window.addedBets.splice(realIndex, 1);
            window.updateUI();
        };

        window.updateUI = () => {
            const listDiv = document.getElementById('betList');
            document.getElementById('listHeader').innerText = `ရွေးချယ်ထားသော ဂဏန်းများ ( ${window.addedBets.length} )`;
            listDiv.innerHTML = window.addedBets.map((item, index) => `
                <div class="bet-item">
                    <div style="flex:1; display:flex; justify-content:space-between; margin-right:15px;">
                        <span style="letter-spacing:2px; font-weight:bold;">${item.num}</span>
                        <span style="color:var(--accent-blue);">${parseInt(item.amt).toLocaleString()} ကျပ်</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <button class="item-r-btn" onclick="window.openRModal('${item.num}', '${item.amt}')">R</button>
                        <button class="item-del-btn" onclick="window.removeBet(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).reverse().join('');
        };

        window.openRModal = (num, amt) => {
            const allPerms = getPermutations(num);
            const alreadyAddedNums = window.addedBets.map(b => b.num);
            const permsToShow = allPerms.filter(n => !alreadyAddedNums.includes(n)); 
            
            if(permsToShow.length === 0) {
                Swal.fire({ title: "ပတ်လည်ဂဏန်းများ အားလုံးပေါင်းပြီးသားဖြစ်သည်", icon: "info", background: "#003366", color: "#fff", timer: 1500, showConfirmButton: false });
                return;
            }

            currentRBaseAmt = amt;
            selectedRNums = [];
            const grid = document.getElementById('rGrid');
            grid.innerHTML = "";
            
            permsToShow.forEach(p => {
                const div = document.createElement('div');
                const isClosed = closedList.includes(p);
                div.className = isClosed ? "r-item disabled-num" : "r-item";
                div.innerText = p;
                div.onclick = () => {
                    if (isClosed) return;
                    div.classList.toggle('selected');
                    if(selectedRNums.includes(p)) selectedRNums = selectedRNums.filter(x => x !== p);
                    else selectedRNums.push(p);
                };
                grid.appendChild(div);
            });
            document.getElementById('rModal').style.display = "flex";
        };

        window.closeRModal = () => document.getElementById('rModal').style.display = "none";

        window.confirmRSelection = () => {
            if(selectedRNums.length === 0) return window.closeRModal();
            selectedRNums.forEach(n => window.addedBets.push({ num: n, amt: currentRBaseAmt }));
            window.updateUI();
            window.closeRModal();
        };

        window.submitBets = () => {
            if (window.addedBets.length === 0) {
                Swal.fire({ title: "ထိုးမည့်ဂဏန်းများ အရင်ပေါင်းထည့်ပါ", icon: "warning", background: "#003366", color: "#fff" });
                return;
            }
            localStorage.setItem('temp4DBet', JSON.stringify({ items: window.addedBets }));
            window.location.href = "4d_bet_confirm.html";
        };

        function getPermutations(str) {
            if (str.length <= 1) return [str];
            let perms = [];
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                let remaining = str.slice(0, i) + str.slice(i + 1);
                for (let p of getPermutations(remaining)) perms.push(char + p);
            }
            return [...new Set(perms)];
        }
    </script>
</body>
</html>
