<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Bet Confirm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg-dark: #001f3f; --bg-card: #003366; --accent-blue: #007bff; --white: #ffffff; --red: #ff3b30; --gold: #ffcc00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: var(--white); padding-bottom: 80px; }
        
        .header { display: flex; align-items: center; padding: 15px; background: #001f3f; border-bottom: 1px solid rgba(0,123,255,0.2); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; width: 40px; }
        .header-title { flex-grow: 1; text-align: center; font-size: 18px; font-weight: bold; }

        .container { padding: 15px; }
        .user-info { background: var(--bg-card); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); }
        
        table { width: 100%; background: var(--bg-card); border-radius: 10px; overflow: hidden; border-collapse: collapse; margin-bottom: 20px; }
        th { background: rgba(0,123,255,0.1); padding: 12px; text-align: left; font-size: 14px; color: var(--accent-blue); border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .price-input { width: 85px; background: #001f3f; border: 1px solid var(--accent-blue); color: white; padding: 6px; border-radius: 5px; text-align: center; outline: none; font-weight: bold; }
        .r-btn { border: 1px solid var(--gold); background: transparent; color: var(--gold); padding: 4px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .trash-btn { color: var(--red); cursor: pointer; font-size: 18px; }

        /* R Modal Style */
        #rModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); width: 92%; max-width: 400px; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--accent-blue); }
        .r-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; max-height: 350px; overflow-y: auto; padding: 5px; }
        .r-item { padding: 10px; background: #001f3f; border: 1px solid var(--accent-blue); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .r-item.selected { background: var(--accent-blue); border-color: white; }
        .r-item.disabled-num { background: #1a0000; border-color: var(--red); color: #555; cursor: not-allowed; }

        .footer-action { position: fixed; bottom: 0; left: 0; width: 100%; background: #001a35; padding: 15px; border-top: 1px solid rgba(0,123,255,0.3); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .total-box { font-size: 16px; font-weight: bold; }
        .submit-btn { background: var(--accent-blue); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Success Popup */
        #pop { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; text-align: center; }
        .pop-card { background: var(--bg-card); padding: 30px; border-radius: 20px; border: 1px solid var(--accent-blue); width: 80%; }
    </style>
</head>
<body>

    <div class="header">
        <a href="4d.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="header-title">4D စာရင်းအတည်ပြုရန်</div>
    </div>

    <div class="container">
        <div class="user-info">
            <span>လက်ကျန်ငွေ</span>
            <span style="color: var(--gold); font-weight: bold;"><span id="uBal">0</span> Ks</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ဂဏန်း</th>
                    <th>R (ပတ်လည်)</th>
                    <th>ပမာဏ</th>
                    <th>ဖျက်</th>
                </tr>
            </thead>
            <tbody id="betTable"></tbody>
        </table>
    </div>

    <div id="rModal">
        <div class="modal-content">
            <h3 style="color: var(--gold); margin-bottom: 10px;">ပတ်လည်ဂဏန်းများရွေးပါ</h3>
            <div class="r-grid" id="rGrid"></div>
            <div style="display:flex; gap:10px;">
                <button class="submit-btn" style="flex:1;" onclick="addRNumbers()">ပေါင်းထည့်မည်</button>
                <button class="submit-btn" style="flex:1; background:#555;" onclick="closeRModal()">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <div class="total-box">စုစုပေါင်း: <span id="totalDisplay" style="color: var(--gold);">0</span> Ks</div>
        <button class="submit-btn" id="submitBtn" onclick="submitBet()">ထိုးမည်</button>
    </div>

    <div id="pop">
        <div class="pop-card">
            <i class="fa-solid fa-circle-check" style="font-size: 60px; color: #52c41a; margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">ထိုးခြင်းအောင်မြင်သည်</h2>
            <button onclick="finish()" style="padding:12px 40px; border-radius:25px; border:none; background:var(--accent-blue); color:white; font-weight: bold; cursor:pointer;">အိုကေ</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCUk-1FHFjhIVDD4foYuKHM7PyT_A1A1vk",
        authDomain: "twod-aa6c1.firebaseapp.com",
        projectId: "twod-aa6c1",
        storageBucket: "twod-aa6c1.appspot.com",
        messagingSenderId: "674076613631",
        appId: "1:674076613631:android:b21b4027ebe6f6f169e5ca"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let tempBetData = JSON.parse(localStorage.getItem('temp4DBet')) || { items: [] };
    let selectedRNums = [];
    let currentRBaseAmt = 0;
    let closedList = [];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            onSnapshot(doc(db, "users", user.uid), (s) => {
                if (s.exists()) document.getElementById('uBal').innerText = s.data().balance.toLocaleString();
            });
        } else {
            window.location.href = "login.html";
        }
    });

    onSnapshot(doc(db, "settings", "4d_settings"), (snap) => {
        if (snap.exists()) {
            const closedStr = snap.data().closed || "";
            closedList = closedStr.split(',').map(n => n.trim());
            renderTable();
        }
    });

    function getPermutations(str) {
        if (str.length <= 1) return [str];
        let perms = [];
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            let remaining = str.slice(0, i) + str.slice(i + 1);
            for (let p of getPermutations(remaining)) perms.push(char + p);
        }
        return [...new Set(perms)];
    }

    window.openRModal = (num, amt) => {
        const allPerms = getPermutations(num);
        const alreadyAdded = tempBetData.items.map(i => i.num);
        const permsToShow = allPerms.filter(n => !alreadyAdded.includes(n));

        if(permsToShow.length === 0) {
            return Swal.fire({ title: "ပတ်လည်ဂဏန်းများ ရှိနှင့်ပြီးသားဖြစ်သည်", icon: "info", background: "#003366", color: "#fff", timer: 1500, showConfirmButton: false });
        }
        
        currentRBaseAmt = amt;
        selectedRNums = [];
        const grid = document.getElementById('rGrid');
        grid.innerHTML = "";
        
        permsToShow.forEach(p => {
            const div = document.createElement('div');
            const isClosed = closedList.includes(p);
            div.className = isClosed ? "r-item disabled-num" : "r-item";
            div.innerText = p;
            div.onclick = () => {
                if(isClosed) {
                    Swal.fire({ title: "ဂဏန်းပိတ်ထားပါသည်", text: `${p} ကို ပိတ်ထားပါသည်`, icon: "error", background: "#003366", color: "#fff", timer: 1000, showConfirmButton: false });
                    return;
                }
                div.classList.toggle('selected');
                if(selectedRNums.includes(p)) selectedRNums = selectedRNums.filter(x => x !== p);
                else selectedRNums.push(p);
            };
            grid.appendChild(div);
        });
        document.getElementById('rModal').style.display = "flex";
    }

    window.closeRModal = () => document.getElementById('rModal').style.display = "none";

    window.addRNumbers = () => {
        if(selectedRNums.length === 0) return closeRModal();
        selectedRNums.forEach(n => {
            tempBetData.items.push({ num: n, amt: currentRBaseAmt });
        });
        localStorage.setItem('temp4DBet', JSON.stringify(tempBetData));
        renderTable();
        closeRModal();
    }

    function renderTable() {
        const tbody = document.getElementById('betTable');
        tbody.innerHTML = "";
        tempBetData.items.forEach((item, idx) => {
            const isClosed = closedList.includes(item.num);
            tbody.innerHTML += `
                <tr style="${isClosed ? 'background:rgba(255,59,48,0.1);' : ''}">
                    <td style="font-weight:bold; color:${isClosed ? 'var(--red)' : 'var(--accent-blue)'}; letter-spacing:1px;">
                        ${item.num} ${isClosed ? '<br><small>(ပိတ်)</small>' : ''}
                    </td>
                    <td><button class="r-btn" onclick="openRModal('${item.num}', ${item.amt})">R</button></td>
                    <td><input type="number" class="price-input" value="${item.amt}" oninput="updateItemAmt(${idx}, this.value)"></td>
                    <td><i class="fa-solid fa-trash-can trash-btn" onclick="removeNum(${idx})"></i></td>
                </tr>
            `;
        });
        updateTotal();
    }

    window.updateItemAmt = (idx, val) => {
        tempBetData.items[idx].amt = val || 0;
        updateTotal();
    };

    window.updateTotal = () => {
        let total = 0;
        tempBetData.items.forEach(item => total += parseInt(item.amt || 0));
        document.getElementById('totalDisplay').innerText = total.toLocaleString();
        localStorage.setItem('temp4DBet', JSON.stringify(tempBetData));
    };

    window.removeNum = (idx) => {
        tempBetData.items.splice(idx, 1);
        renderTable();
    };

    window.submitBet = async () => {
        const total = parseInt(document.getElementById('totalDisplay').innerText.replace(/,/g, ''));
        const curBal = parseInt(document.getElementById('uBal').innerText.replace(/,/g, ''));

        if (tempBetData.items.length === 0) return;

        let foundClosed = tempBetData.items.filter(item => closedList.includes(item.num));
        if (foundClosed.length > 0) {
            const names = foundClosed.map(i => i.num).join(", ");
            return Swal.fire({ title: "ဂဏန်းပိတ်ထားပါသည်", html: `စာရင်းထဲရှိ <b style="color:red;">${names}</b> များမှာ ပိတ်ထားသောဂဏန်းများဖြစ်ပါသည်၊ ဖျက်ပေးပါ။`, icon: "error" });
        }

        if (total > curBal) return Swal.fire("အမှား", "လက်ကျန်ငွေမလုံလောက်ပါ", "error");

        Swal.fire({
            title: 'ခဏစောင့်ပါ...',
            text: 'စာရင်းသွင်းနေပါသည်',
            allowOutsideClick: false,
            showConfirmButton: false,
            background: "#002d5a",
            color: "#fff",
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            document.getElementById('submitBtn').disabled = true;
            const d = new Date();
            const todayStr = `${d.getDate()}.${d.getMonth() + 1}.${d.getFullYear()}`;

            await updateDoc(doc(db, "users", currentUser.uid), { balance: increment(-total) });
            
            await addDoc(collection(db, "4d_bets"), {
                uid: currentUser.uid,
                phone: currentUser.email.split('@')[0],
                items: tempBetData.items,
                total: total,
                time: "4D Section",
                type: "4D",
                date: todayStr,
                status: "pending",
                timestamp: serverTimestamp()
            });

            Swal.close();
            document.getElementById('pop').style.display = 'flex';
        } catch (err) {
            Swal.close();
            Swal.fire("Error", "ဆာဗာသို့ ပေးပို့ရာတွင် အမှားအယွင်းရှိပါသည်", "error");
            document.getElementById('submitBtn').disabled = false;
        }
    };

    window.finish = function() { 
        localStorage.removeItem('temp4DBet'); 
        window.location.href = "two_history.html"; 
    };

    renderTable();
</script>
</body>
</html>
