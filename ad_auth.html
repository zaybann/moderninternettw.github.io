<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg: #f4f7f6;
            --primary: #2c3e50;
            --accent: #3498db;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pyidaungsu', sans-serif; }
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 350px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .login-card i.main-icon {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 22px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .login-card p {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 100;
        }
        .spinner {
            width: 30px; height: 30px; border: 3px solid #eee;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="login-card">
        <i class="fas fa-user-shield main-icon"></i>
        <h2>Admin Login</h2>
        <p>စီမံခန့်ခွဲသူအကောင့်ဖြင့် ဝင်ရောက်ပါ</p>

        <form id="loginForm">
            <div class="input-group">
                <label>အီးမေးလ် (Email)</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>

            <div class="input-group">
                <label>လျှို့ဝှက်နံပါတ် (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Login ဝင်မည်</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Config (သင့် App ရဲ့ Config နဲ့ အစားထိုးပါ)
        const firebaseConfig = { 
            apiKey: "AIzaSyCUk-1FHFjhIVDD4foYuKHM7PyT_A1A1vk", 
            authDomain: "twod-aa6c1.firebaseapp.com", 
            projectId: "twod-aa6c1", 
            storageBucket: "twod-aa6c1.appspot.com", 
            messagingSenderId: "674076613631", 
            appId: "1:674076613631:android:b21b4027ebe6f6f169e5ca" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // အကယ်၍ Login ဝင်ထားပြီးသားဆိုရင် Dashboard ကို တန်းပို့မယ်
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "adhome.html";
        });

        const loginForm = document.getElementById('loginForm');
        const loader = document.getElementById('loadingOverlay');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loader.style.display = 'flex';

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Login အောင်မြင်ရင် adhome.html ကိုသွားမယ်
                    window.location.href = "adhome.html";
                })
                .catch((error) => {
                    loader.style.display = 'none';
                    let errorMsg = "အကောင့်ဝင်ခြင်း မအောင်မြင်ပါ။";
                    
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        errorMsg = "အီးမေးလ် သို့မဟုတ် လျှို့ဝှက်နံပါတ် မှားယွင်းနေပါသည်။";
                    }

                    Swal.fire({
                        icon: 'error',
                        title: 'မှားယွင်းမှုရှိပါသည်',
                        text: errorMsg,
                        confirmButtonColor: '#3498db'
                    });
                });
        });
    </script>
</body>
</html>
