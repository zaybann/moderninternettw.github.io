<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg-dark: #000b14; 
            --card-bg: #001e36;
            --accent: #1890ff; 
            --white: #ffffff; 
            --text-dim: #a6adb4;
            --danger: #ff4d4f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        /* Loading Overlay matching Dashboard */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 11, 20, 0.7); display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }
        .loader {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-bottom-color: var(--accent); border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-card i.main-icon {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .login-card h2 {
            font-size: 20px;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .login-card p {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(0, 11, 20, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(0, 11, 20, 0.8);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader"></div>
    </div>

    <div class="login-card">
        <i class="fas fa-user-shield main-icon"></i>
        <h2>ADMIN LOGIN</h2>
        <p>စီမံခန့်ခွဲသူအကောင့်ဖြင့် ဝင်ရောက်ပါ</p>

        <form id="loginForm">
            <div class="form-group">
                <label>အီးမေးလ် (Email Address)</label>
                <input type="email" id="email" placeholder="example@admin.com" required>
            </div>

            <div class="form-group">
                <label>လျှို့ဝှက်နံပါတ် (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">အကောင့်ဝင်မည်</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Dashboard နှင့် တူညီသော Config
        const firebaseConfig = { 
            apiKey: "AIzaSyCUk-1FHFjhIVDD4foYuKHM7PyT_A1A1vk", 
            authDomain: "twod-aa6c1.firebaseapp.com", 
            projectId: "twod-aa6c1", 
            storageBucket: "twod-aa6c1.appspot.com", 
            messagingSenderId: "674076613631", 
            appId: "1:674076613631:android:b21b4027ebe6f6f169e5ca" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Login ဝင်ထားပြီးသားဖြစ်ပါက Dashboard သို့ တန်းပို့မည်
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "adhome.html";
        });

        const loginForm = document.getElementById('loginForm');
        const loader = document.getElementById('loadingScreen');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Show Loading
            loader.style.display = 'flex';

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Success - onAuthStateChanged မှ Dashboard သို့ ပို့ပေးလိမ့်မည်
                })
                .catch((error) => {
                    loader.style.display = 'none';
                    let errorMsg = "အကောင့်ဝင်ခြင်း မအောင်မြင်ပါ။";
                    
                    if (error.code === 'auth/invalid-credential') {
                        errorMsg = "အီးမေးလ် သို့မဟုတ် လျှို့ဝှက်နံပါတ် မှားယွင်းနေပါသည်။";
                    }

                    Swal.fire({
                        icon: 'error',
                        title: 'Login Error',
                        text: errorMsg,
                        background: '#001e36',
                        color: '#fff',
                        confirmButtonColor: '#1890ff'
                    });
                });
        });
    </script>
</body>
</html>
