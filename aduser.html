<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Manager - MMK 2D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg-dark: #000b18; 
            --bg-card: rgba(0, 51, 102, 0.4); 
            --accent-blue: #00a2ff; 
            --white: #ffffff; 
            --btn-blue: linear-gradient(135deg, #007bff, #0056b3);
            --glass: rgba(255, 255, 255, 0.05);
            --dim: #a6adb4;
            --success: #52c41a;
            --warning: #ffc107;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top, #001f3f, #000b18);
            color: var(--white); 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh; 
        }

        /* Back Button Header */
        .header-nav { 
            display: flex; align-items: center; width: 100%; max-width: 500px; 
            padding: 15px 0; margin-bottom: 10px;
        }
        .back-btn { 
            color: var(--white); text-decoration: none; font-size: 18px; 
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }

        .info-card { 
            background: var(--bg-card); 
            backdrop-filter: blur(15px);
            width: 100%; max-width: 500px; 
            padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { 
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 22px; font-weight: bold; 
        }
        .header p { font-size: 12px; color: var(--dim); margin-top: 5px; }

        .search-box { 
            margin-bottom: 25px; background: rgba(0,0,0,0.2); 
            padding: 15px; border-radius: 15px; border: 1px solid var(--glass); 
        }
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.07); 
            border: 1px solid rgba(0, 162, 255, 0.3); border-radius: 10px; 
            color: white; margin-bottom: 12px; outline: none; font-size: 15px; 
        }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0, 162, 255, 0.2); }
        
        .btn-search { 
            width: 100%; padding: 14px; background: var(--btn-blue); 
            border: none; border-radius: 10px; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 15px; 
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        .btn-search:active { transform: scale(0.97); }

        /* Result Area */
        .result-area { display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .group-title { font-size: 11px; font-weight: bold; color: var(--accent-blue); margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }

        .detail-box { background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid var(--glass); overflow: hidden; }
        .info-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--glass); }
        .info-item:last-child { border-bottom: none; }
        
        .label { color: var(--dim); font-size: 13px; }
        .value { color: var(--white); font-weight: 600; font-size: 15px; text-align: right; }
        
        .bal-value { color: var(--success); font-size: 18px; font-weight: bold; }
        .pass-value { color: var(--warning); font-family: 'Courier New', Courier, monospace; font-size: 18px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="adhome.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>
    </div>

    <div class="info-card">
        <div class="header">
            <h2><i class="fas fa-user-shield"></i> User Explorer</h2>
            <p>Database အတွင်းရှိ အသုံးပြုသူ၏ အချက်အလက်များ</p>
        </div>

        <div class="search-box">
            <input type="number" id="searchPhone" placeholder="ရှာဖွေမည့် ဖုန်းနံပါတ် (09xxx)">
            <button class="btn-search" id="btnSearch">
                <i class="fas fa-search"></i> ဒေတာဆွဲယူမည်
            </button>
        </div>

        <div class="result-area" id="resultArea">
            <div class="group-title">Personal Info</div>
            <div class="detail-box">
                <div class="info-item">
                    <span class="label">အမည်</span>
                    <span class="value" id="resName">-</span>
                </div>
                <div class="info-item">
                    <span class="label">ဖုန်းနံပါတ်</span>
                    <span class="value" id="resPhone">-</span>
                </div>
            </div>

            <div class="group-title">Wallet & Security</div>
            <div class="detail-box">
                <div class="info-item">
                    <span class="label">လက်ရှိလက်ကျန်ငွေ</span>
                    <span class="value bal-value" id="resBalance">0 K</span>
                </div>
                <div class="info-item">
                    <span class="label">စကားဝှက် (Password)</span>
                    <span class="value pass-value" id="resPass">-</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUk-1FHFjhIVDD4foYuKHM7PyT_A1A1vk",
            authDomain: "twod-aa6c1.firebaseapp.com",
            projectId: "twod-aa6c1",
            storageBucket: "twod-aa6c1.appspot.com",
            messagingSenderId: "674076613631",
            appId: "1:674076613631:android:b21b4027ebe6f6f169e5ca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "auth.html"; });

        document.getElementById('btnSearch').onclick = async () => {
            const phone = document.getElementById('searchPhone').value.trim();
            if(!phone) return Swal.fire({ 
                title: "သတိ", text: "ဖုန်းနံပါတ် ရိုက်ထည့်ပါ", icon: "warning", 
                background: "#001f3f", color: "#fff", confirmButtonColor: "#007bff" 
            });

            Swal.fire({ 
                title: 'ရှာဖွေနေသည်...', 
                background: "#001f3f", color: "#fff",
                didOpen: () => Swal.showLoading(),
                allowOutsideClick: false
            });

            try {
                const q = query(collection(db, "users"), where("phone", "==", phone));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    Swal.fire({ 
                        title: "မတွေ့ပါ", text: "ဤဖုန်းနံပါတ်ဖြင့် အသုံးပြုသူ မရှိပါ။", icon: "error",
                        background: "#001f3f", color: "#fff", confirmButtonColor: "#007bff"
                    });
                    document.getElementById('resultArea').style.display = 'none';
                } else {
                    Swal.close();
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        document.getElementById('resName').innerText = data.name || "N/A";
                        document.getElementById('resPhone').innerText = data.phone || "N/A";
                        document.getElementById('resBalance').innerText = (data.balance || 0).toLocaleString() + " K";
                        document.getElementById('resPass').innerText = data.password || "မတွေ့ပါ";
                        document.getElementById('resultArea').style.display = 'block';
                    });
                }
            } catch (e) {
                Swal.fire({ 
                    title: "Error", text: "ဒေတာဆွဲယူရာတွင် အမှားရှိနေပါသည်။", icon: "error",
                    background: "#001f3f", color: "#fff"
                });
            }
        };
    </script>
</body>
</html>
