<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Maintenance | Lucky Boss 556</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #7000ff;
            --dark-bg: #00050a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }

        body {
            background-color: var(--dark-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background Particles */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-blue);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            text-align: center;
            position: relative;
            padding: 20px;
        }

        /* Hexagon Icon Design */
        .icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hex-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 242, 254, 0.1);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 2px solid var(--neon-blue);
            animation: pulse 2s infinite;
        }

        .icon-wrapper i {
            font-size: 50px;
            color: var(--neon-blue);
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        /* Glitch Effect Text */
        .glitch {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
            margin-bottom: 10px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.025em 0 rgba(0,255,0,.75), -0.025em -0.05em 0 rgba(0,0,255,.75); }
        }

        .desc {
            color: #80d4ff;
            font-size: 14px;
            max-width: 300px;
            margin: 0 auto 40px;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        /* Scanning Line */
        .scan-line {
            width: 200px;
            height: 2px;
            background: var(--neon-blue);
            margin: 20px auto;
            position: relative;
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: scaleX(0); opacity: 0; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }

        .btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
            background: rgba(0, 242, 254, 0.05);
        }

        .btn-contact:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="icon-wrapper">
            <div class="hex-bg"></div>
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h1 class="glitch"Lee</h1>
        
        <p class="desc">Leeဘဲရမယ် အခုမှလာဝင်မကြည့်နဲ့ ငါလိုးမ သက်သက်မယ့်ပြောထားတဲ့စာတွေကို ဝင်မကြည့်လို့ကိုဖျတ်ထားတာ🙂🙂</p>

        <div class="scan-line"></div>

        <a href="https://t.me/thitsarshin009" class="btn-contact">
            <i class="fa-brands fa-telegram"></i> Contact Support
        </a>

        <div style="margin-top: 50px; font-size: 10px; color: #444; letter-spacing: 3px;">
            KMKL
        </div>
    </div>

</body>
</html>
