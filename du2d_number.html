<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai 2D - All Sections</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg-dark: #000b18; --bg-card: rgba(0, 51, 102, 0.5); 
            --accent-blue: #00a2ff; --white: #ffffff; 
            --btn-blue: linear-gradient(135deg, #007bff, #0056b3);
            --glass: rgba(255, 255, 255, 0.05);
            --dim: #a6adb4;
        }
        
        body { margin: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; background: radial-gradient(circle at top, #001f3f, #000b18); color: var(--white); overflow-x: hidden; padding-bottom: 80px; }
        
        /* Loading Screen */
        #loadingScreen {
            position: fixed; inset: 0; background: rgba(0, 11, 24, 0.4); 
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            backdrop-filter: blur(8px);
        }
        .loader { width: 45px; height: 45px; border: 4px solid var(--glass); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header */
        header { padding: 20px; display: flex; align-items: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; margin-right: 15px; }
        .page-title { flex: 1; font-size: 20px; font-weight: bold; text-align: center; color: var(--accent-blue); }

        /* Home Content */
        .container { padding: 20px; }
        .wallet-card { background: var(--bg-card); border-radius: 15px; padding: 20px; border: 1px solid var(--glass); margin-bottom: 20px; text-align: center; }
        .balance-amt { font-size: 28px; font-weight: bold; color: var(--accent-blue); }

        /* Announcement */
        .announcement { background: rgba(0, 162, 255, 0.1); padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(0, 162, 255, 0.2); font-size: 14px; }

        /* Main Action Button */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; padding: 20px; background: rgba(0, 11, 24, 0.9); border-top: 1px solid var(--glass); }
        .play-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--btn-blue); color: white; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* Modal Styles */
        #sectionModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: flex-end; }
        .modal-box { background: #001a35; width: 100%; padding: 25px 20px; border-top-left-radius: 25px; border-top-right-radius: 25px; border-top: 2px solid var(--accent-blue); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .section-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 18px; margin-bottom: 12px; background: var(--btn-blue); color: white; border-radius: 12px; font-weight: bold; border: none; font-size: 15px; cursor: pointer; }
        .close-btn { width: 100%; padding: 15px; border: none; background: transparent; color: var(--dim); cursor: pointer; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader"></div></div>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title">ဒူဘိုင်း 2D</div>
    </header>

    <div class="container">
        <div class="wallet-card">
            <div style="font-size: 14px; color: var(--dim);">လက်ကျန်ငွေ</div>
            <div class="balance-amt" id="userBalance">0 ကျပ်</div>
        </div>

        <div class="announcement">
            <marquee scrollamount="5">ဒူဘိုင်း 2D တစ်နေ့ (၆) ကြိမ် - 11:00 AM, 01:00 PM, 03:00 PM, 05:00 PM, 07:00 PM, 09:00 PM အချိန်တိုင်း ကစားနိုင်ပါသည်။</marquee>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <img src="https://raw.githubusercontent.com/zaybann/mmkgame/refs/heads/main/IMG_20260214_114528_306.jpg" style="width: 100%; border-radius: 15px; opacity: 0.8;">
        </div>
    </div>

    <div class="bottom-nav">
        <button class="play-btn" onclick="toggleModal(true)">ထိုးမည်</button>
    </div>

    <div id="sectionModal" onclick="toggleModal(false)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 20px; text-align: center;">အချိန်အပိုင်းအခြား ရွေးပါ</h3>
            
            <button onclick="goToSection('du_11', '11:00 AM Section')" class="section-btn">11:00 AM Section</button>
            <button onclick="goToSection('du_01', '01:00 PM Section')" class="section-btn">01:00 PM Section</button>
            <button onclick="goToSection('du_03', '03:00 PM Section')" class="section-btn">03:00 PM Section</button>
            <button onclick="goToSection('du_05', '05:00 PM Section')" class="section-btn">05:00 PM Section</button>
            <button onclick="goToSection('du_07', '07:00 PM Section')" class="section-btn">07:00 PM Section</button>
            <button onclick="goToSection('du_09', '09:00 PM Section')" class="section-btn">09:00 PM Section</button>
            
            <button class="close-btn" onclick="toggleModal(false)">ပိတ်မည်</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUk-1FHFjhIVDD4foYuKHM7PyT_A1A1vk",
            authDomain: "twod-aa6c1.firebaseapp.com",
            projectId: "twod-aa6c1",
            storageBucket: "twod-aa6c1.appspot.com",
            messagingSenderId: "674076613631",
            appId: "1:674076613631:android:b21b4027ebe6f6f169e5ca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // အပိတ်အဖွင့် အခြေအနေ သိမ်းဆည်းရန်
        let sectionStatus = {};

        // Admin Time Control ကို နားထောင်ခြင်း
        onSnapshot(doc(db, "settings", "time_control"), (docSnap) => {
            if (docSnap.exists()) {
                sectionStatus = docSnap.data();
            }
        });

        // User အချက်အလက်နှင့် Balance စစ်ဆေးခြင်း
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        document.getElementById('userBalance').innerText = (docSnap.data().balance || 0).toLocaleString() + " ကျပ်";
                        document.getElementById('loadingScreen').style.display = 'none';
                    }
                });
            } else {
                window.location.href = 'auth.html';
            }
        });

        // ထိုးမည် ခလုတ် နှိပ်သောအခါ
        window.goToSection = (key, name) => {
            // Admin က ပိတ်မထားလျှင် (false မဟုတ်လျှင်) ဝင်ခွင့်ပေးမည်
            if (sectionStatus[key] !== false) {
                window.location.href = `du2d_number.html?s=${key}&n=${encodeURIComponent(name)}`;
            } else {
                Swal.fire({
                    title: "ထိုးချိန်ပြည့်ပါပြီ",
                    text: name + " အား ခေတ္တပိတ်ထားပါသည်။",
                    icon: "error",
                    background: "#002d5a",
                    color: "#fff",
                    confirmButtonColor: "#007bff"
                });
            }
        };

        window.toggleModal = (s) => {
            document.getElementById('sectionModal').style.display = s ? 'flex' : 'none';
        };

        // Page Load ဖြစ်လျှင် Loading ပိတ်ရန် (Error ကင်းစေရန်)
        window.addEventListener('load', () => {
            setTimeout(() => {
                if(document.getElementById('loadingScreen').style.display !== 'none') {
                    document.getElementById('loadingScreen').style.display = 'none';
                }
            }, 3000);
        });
    </script>
</body>
</html>
